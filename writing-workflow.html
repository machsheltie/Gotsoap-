  <script>if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');</script>
  <style>
    :root {
      --bg: #f8f5ef; --surface: #fffaf1; --surface-2: #f0e7d8;
      --text: #211b16; --muted: #6f6257; --line: #d7c8b8;
      --accent: #9b5d3d; --agent: #536b57; --skill: #5c6f91;
      --shadow: 0 18px 60px rgba(50, 35, 23, .18);
    }
    .dark {
      --bg: #15120f; --surface: #211c17; --surface-2: #2c251f;
      --text: #f3eadf; --muted: #c6b7a8; --line: #4a3f35;
      --accent: #d09669; --agent: #9fbc97; --skill: #9db5dd;
      --shadow: 0 18px 60px rgba(0, 0, 0, .45);
    }
    body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .surface { background: var(--surface); border: 1px solid var(--line); box-shadow: var(--shadow); }
    .surface-soft { background: var(--surface-2); border: 1px solid var(--line); }
    .muted { color: var(--muted); }
    a { color: var(--accent); text-decoration-color: color-mix(in srgb, var(--accent), transparent 55%); }
    code.inline { color: var(--accent); background: color-mix(in srgb, var(--accent), transparent 88%); padding: .1rem .3rem; border-radius: .35rem; }
    .pill { border: 1px solid var(--line); background: var(--surface-2); }
    .selected { outline: 2px solid var(--accent); }
    .diagram-wrap { touch-action: none; background-image: radial-gradient(circle at 1px 1px, color-mix(in srgb, var(--line), transparent 55%) 1px, transparent 0); background-size: 24px 24px; }
    #stage { transform-origin: 0 0; transition: transform .05s linear; }
    #diagram svg { max-width: none !important; height: auto; }
    #diagram .node { cursor: pointer; }
    #diagram .cluster rect { fill: transparent !important; stroke: var(--line) !important; stroke-width: 1px !important; rx: 14px; ry: 14px; }
    #diagram .cluster-label, #diagram .cluster .nodeLabel { color: var(--muted) !important; fill: var(--muted) !important; }
    #diagram .cluster-label text, #diagram .cluster-label span { fill: var(--muted) !important; color: var(--muted) !important; }
    .sidebar { flex-shrink: 0; overflow: hidden; transition: width .22s ease; }
    .sidebar > .sidebar-inner { height: 100%; overflow-y: auto; }
    .sidebar.left { width: 300px; }
    .sidebar.right { width: 360px; }
    .sidebar.collapsed { width: 0; }
  </style>
</head>
<body>
  <main class="flex flex-1 min-h-0 gap-4 p-4 md:px-8">
    <div id="nav-panel" class="sidebar left collapsed surface rounded-3xl">
      <div class="sidebar-inner" style="width: 300px;">
        <div class="flex items-center justify-between p-4 border-b" style="border-color: var(--line)">
          <span class="text-sm font-semibold uppercase tracking-[0.16em] muted">Browse</span>
          <button class="pill rounded-full w-8 h-8 flex items-center justify-center" onclick="closeNav()">&times;</button>
        </div>
        <div class="p-4">
          <input id="filter" class="w-full rounded-2xl border bg-transparent px-3 py-2 text-sm" style="border-color: var(--line)" placeholder="Filter…" oninput="renderList()" />
          <div id="list" class="mt-4 flex flex-col gap-2"></div>
        </div>
      </div>
    </div>

    <section class="flex-1 min-w-0 surface overflow-hidden rounded-3xl flex flex-col">
      <div class="flex flex-wrap items-center justify-between gap-3 border-b px-4 py-3 md:px-5" style="border-color: var(--line)">
        <div class="flex items-center gap-3">
          <button class="pill rounded-full px-3 py-2 text-sm" onclick="toggleNav()">☰</button>
          <h2 id="diagram-title" class="font-semibold">Writing workflow</h2>
        </div>
        <div class="flex items-center gap-2">
          <button class="pill rounded-full px-3 py-2 text-sm" onclick="toggleDetail()">Details</button>
          <button class="pill rounded-full px-3 py-2 text-sm" onclick="resetView()">Reset</button>
          <button id="theme-btn" class="pill rounded-full px-3 py-2 text-sm" onclick="toggleTheme()">🌙</button>
        </div>
      </div>
      <p id="diagram-subtitle" class="px-5 py-1.5 text-xs muted border-b" style="border-color: var(--line)"></p>
      <div id="viewport" class="diagram-wrap flex-1 min-h-0 overflow-hidden p-6">
        <div id="stage" class="inline-block min-w-[920px]">
          <div id="diagram"></div>
        </div>
      </div>
    </section>

    <div id="detail-panel" class="sidebar right collapsed surface rounded-3xl">
      <div class="sidebar-inner" style="width: 360px;">
        <div class="flex items-center justify-between p-5 border-b" style="border-color: var(--line)">
          <p id="detail-kicker" class="text-xs uppercase tracking-[0.22em] muted">Selected</p>

        </div>
        <div class="p-5">

            <div id="detail-source" class="text-sm"></div>
          </div>
          <div id="detail-sections" class="mt-5 space-y-5"></div>
        </div>
      </div>
    </div>
  </main>

      renderDiagram();
    };

    function initMermaid() {
      mermaid.initialize({
        startOnLoad: false,
        securityLevel: 'loose',
        theme: isDark() ? 'dark' : 'default',
        flowchart: { curve: 'basis', nodeSpacing: 34, rankSpacing: 58, htmlLabels: true }
      });
    }
    initMermaid();

    const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const id = s => String(s).replace(/[^a-zA-Z0-9_]/g, '_');
    const relLink = f => `<a href="../${esc(f)}" target="_blank" rel="noreferrer"><code class="inline">${esc(f)}</code></a>`;

    const agentNodeId = name => `agent_${id(name)}`;
    const skillNodeId = name => `skill_${id(name)}`;
    const resourceNodeId = name => `resource_${id(name)}`;
    const EDGE_STYLES = {
      loaded: 'stroke:#5c6f91,stroke-width:2px',
      available: 'stroke:#5c6f91,stroke-width:2px,stroke-dasharray: 5 5',
      routed: 'stroke:#536b57,stroke-width:2.5px',
      skillLoad: 'stroke:#8b7a6a,stroke-width:1.5px,stroke-dasharray: 3 5'
    };
    const ROLE_GROUPS = [
      { id: 'production', label: 'Production', agents: ['writer', 'editor'] },
      { id: 'critique', label: 'Critique', agents: ['critic', 'reader-sim', 'continuity-checker'] },
      { id: 'planning', label: 'Planning', agents: ['brainstormer', 'outliner'] },
      { id: 'support', label: 'Support', agents: ['style-creator', 'web-researcher', 'character-sim'] },
      { id: 'memory', label: 'Memory', agents: ['kb-lead'] }
    ];

    function unique(items) { return [...new Set(items.filter(Boolean))]; }

    function allAgentNames() {
      const names = new Set(Object.keys(DATA.agents));
      for (const agent of Object.values(DATA.agents)) for (const route of agent.routes || []) names.add(route);
      return [...names];
    }

    function allSkillNames() {
      const names = new Set(Object.keys(DATA.skills));
      for (const agent of Object.values(DATA.agents)) {
        for (const skill of agent.load || []) names.add(skill);
        for (const skill of agent.available || []) names.add(skill);
      }
      for (const skill of Object.values(DATA.skills)) for (const loaded of skill.loads || []) names.add(loaded);
      return [...names];
    }

    function agentInfo(name) {
      return DATA.agents[name] || {
        name,
        path: null,
        description: 'Referenced routed agent from a dependency package; detailed metadata is not embedded in this page.',
        load: [],
        available: [],
        routes: [],
        external: true
      };
    }

    function skillInfo(name) {
      return DATA.skills[name] || {
        name,
        path: null,
        description: 'Referenced skill from a dependency package; detailed metadata is not embedded in this page.',
        type: 'dependency reference',
        modelInvocable: null,
        loads: [],
        resources: [],
        source: 'referenced'
      };
    }

    function sortedAgentItems() {
      return allAgentNames().map(agentInfo).sort((a, b) => (a.name === 'muse' ? -1 : b.name === 'muse' ? 1 : a.name.localeCompare(b.name)));
    }

    function sortedSkillItems() {
      return allSkillNames().map(skillInfo).sort((a, b) => a.name.localeCompare(b.name));
    }

    function renderList() {
      const q = document.getElementById('filter').value.toLowerCase();
      const list = document.getElementById('list');
      const agents = sortedAgentItems().filter(x => x.name.toLowerCase().includes(q));
      const skills = sortedSkillItems().filter(x => x.name.toLowerCase().includes(q));
      list.innerHTML = `
        <div class="text-xs font-semibold uppercase tracking-[0.16em] muted">Agents</div>
        ${agents.map(x => listButton(x, 'agent')).join('')}
        <div class="pt-3 text-xs font-semibold uppercase tracking-[0.16em] muted">Skills</div>
        ${skills.map(x => listButton(x, 'skill')).join('')}
      `;
    }

    function listButton(item, type) {
      const active = item.name === selected && ((type === 'agent' && mode === 'agents') || (type === 'skill' && mode === 'skills'));
      const action = type === 'agent' ? `selectAgent('${esc(item.name)}')` : `selectSkill('${esc(item.name)}')`;
      const prefix = type === 'agent' ? '@' : '/';
      return `
        <button class="pill ${active ? 'selected' : ''} rounded-2xl px-3 py-2 text-left" onclick="${action}">
          <div class="font-medium">${prefix}${esc(item.name)}</div>
          <div class="mt-1 line-clamp-2 text-xs muted">${esc(item.description || item.type || '')}</div>
        </button>
      `;
    }

    function addEdge(lines, edgeStyles, from, edge, to, style) {
      lines.push(`  ${from} ${edge} ${to}`);
      edgeStyles.push(style);
    }

    function addEdgeStyles(lines, edgeStyles) {
      edgeStyles.forEach((style, index) => lines.push(`  linkStyle ${index} ${style};`));
    }

    function addSkillGroup(lines, groupId, label, skills, direction) {
      if (!skills.length) return;
      lines.push(`  subgraph ${groupId}["${label}"]`);
      lines.push(`    direction ${direction}`);
      for (const skill of skills) lines.push(`    ${skillNodeId(skill)}["/${skill}"]:::skill`);
      lines.push('  end');
    }

    function addAgentGroup(lines, groupId, label, agents, direction) {
      if (!agents.length) return;
      lines.push(`    subgraph ${groupId}["${label}"]`);
      lines.push(`      direction ${direction}`);
      for (const agent of agents) lines.push(`      ${agentNodeId(agent)}["@${agent}"]:::routed`);
      lines.push('    end');
    }

    function fullSystemGraph() {
      const edgeStyles = [];
      const lines = ['flowchart TB'];
      const agentNames = allAgentNames();
      const skillNames = allSkillNames();
      const assignedAgents = new Set(['muse']);
      const root = agentNodeId('muse');

      lines.push(`  ${root}["@muse"]:::agent`);
      lines.push('  subgraph routed_agents["Routed agents"]');
      lines.push('    direction LR');
      for (const group of ROLE_GROUPS) {
        const members = group.agents.filter(name => agentNames.includes(name) && !assignedAgents.has(name));
        members.forEach(name => assignedAgents.add(name));
        addAgentGroup(lines, `role_${group.id}`, group.label, members, 'TB');
      }
      const remaining = agentNames.filter(name => !assignedAgents.has(name));
      addAgentGroup(lines, 'role_other', 'Other', remaining, 'TB');
      lines.push('  end');

      const agentSkillCounts = {};
      for (const agent of Object.values(DATA.agents)) {
        for (const skill of unique([...(agent.load || []), ...(agent.available || [])])) agentSkillCounts[skill] = (agentSkillCounts[skill] || 0) + 1;
      }
      const sharedSkills = skillNames.filter(skill => (agentSkillCounts[skill] || 0) > 1).sort();
      const singleSkills = skillNames.filter(skill => !sharedSkills.includes(skill)).sort();
      lines.push('  subgraph skills_layer["Skills"]');
      lines.push('    direction TB');
      addSkillGroup(lines, 'shared_skills', 'Shared infrastructure', sharedSkills, 'LR');
      addSkillGroup(lines, 'single_skills', 'Single-agent or indirect', singleSkills, 'LR');
      lines.push('  end');

      const muse = DATA.agents.muse;
      if (muse) for (const route of unique(muse.routes || [])) addEdge(lines, edgeStyles, root, '-->|routes|', agentNodeId(route), EDGE_STYLES.routed);
      for (const agent of Object.values(DATA.agents)) {
        const source = agentNodeId(agent.name);
        for (const skill of unique(agent.load || [])) addEdge(lines, edgeStyles, source, '-->|loads|', skillNodeId(skill), EDGE_STYLES.loaded);
        for (const skill of unique(agent.available || [])) addEdge(lines, edgeStyles, source, '-. available .->', skillNodeId(skill), EDGE_STYLES.available);
      }
      for (const skill of Object.values(DATA.skills)) {
        for (const loaded of unique(skill.loads || [])) addEdge(lines, edgeStyles, skillNodeId(skill.name), '-. loads .->', skillNodeId(loaded), EDGE_STYLES.skillLoad);
      }

      addClasses(lines);
      addEdgeStyles(lines, edgeStyles);
      return lines.join('\n');
    }

    function addClasses(lines) {
      lines.push('  classDef agent stroke:#536b57,stroke-width:3px,fill:transparent;');
      lines.push('  classDef routed stroke:#536b57,stroke-width:2px,fill:transparent;');
      lines.push('  classDef skill stroke:#5c6f91,stroke-width:2px,fill:transparent;');
      lines.push('  classDef skill2 stroke:#5c6f91,stroke-width:2px,fill:transparent;');
      lines.push('  classDef resource stroke:#9b5d3d,stroke-width:2px,stroke-dasharray: 5 5,fill:transparent;');
      lines.push('  classDef meta stroke:#8b7a6a,stroke-width:2px,stroke-dasharray: 5 5,fill:transparent;');
    }

    function clickTargetForNode(node) {
      const nodeId = node.getAttribute('id') || '';
      const isAgent = node.classList.contains('agent') || node.classList.contains('routed');
      const isSkill = node.classList.contains('skill') || node.classList.contains('skill2');
      const names = isAgent ? allAgentNames() : isSkill ? allSkillNames() : [];
      for (const name of names) {
        const graphId = isAgent ? agentNodeId(name) : skillNodeId(name);
        if (nodeId.includes(`flowchart-${graphId}-`)) return { type: isAgent ? 'agent' : 'skill', name };
      }
      return null;
    }

    window.selectSkill = function(name) { mode = 'skills'; selected = name; renderList(); renderDetail(); openDetail(); }
    window.selectAgent = function(name) { mode = 'agents'; selected = name; renderList(); renderDetail(); openDetail(); }

    function bindDiagramClicks() {
      document.querySelectorAll('#diagram .node').forEach(node => {
        const target = clickTargetForNode(node);
        if (!target) return;
        node.setAttribute('title', target.name);
        node.classList.add('clickable');
        node.addEventListener('click', event => {
          event.preventDefault();
          event.stopImmediatePropagation();
          if (target.type === 'agent') selectAgent(target.name);
          if (target.type === 'skill') selectSkill(target.name);
        }, true);
      });
    }

    async function renderDiagram() {
      initMermaid();
      const el = document.getElementById('diagram');
      el.innerHTML = '';
      const { svg } = await mermaid.render('graph-system-' + Date.now(), fullSystemGraph());
      el.innerHTML = svg;
      bindDiagramClicks();
      resetView();
      document.getElementById('diagram-title').textContent = 'Writing workflow';
      document.getElementById('diagram-subtitle').textContent = 'Solid = loaded, dashed = on-demand / skill-loads, green = routed agents.';
    }

    function section(title, items, formatter = x => esc(x)) {
      return `<section><h3 class="mb-2 text-sm font-semibold uppercase tracking-[0.16em] muted">${title}</h3>${items.length ? `<div class="flex flex-wrap gap-2">${items.map(formatter).join('')}</div>` : '<p class="text-sm muted">None declared.</p>'}</section>`;
    }
    const skillPill = s => `<button class="pill rounded-full px-3 py-1 text-sm" onclick="selectSkill('${esc(s)}')">/${esc(s)}</button>`;
    const agentPill = a => `<button class="pill rounded-full px-3 py-1 text-sm" onclick="selectAgent('${esc(a)}')">@${esc(a)}</button>`;
    const resourcePill = (r, base) => `<span class="pill rounded-full px-3 py-1 text-sm"><code>${esc(r)}</code></span>`;

    function renderDetail() {
      if (mode === 'system') {
        const agentCount = allAgentNames().length;
        const skillCount = allSkillNames().length;
        document.getElementById('detail-kicker').textContent = 'Overview';
        document.getElementById('detail-title').textContent = 'Full system';
        document.getElementById('detail-desc').textContent = 'Muse is shown as the orchestrator, routed agents are grouped by role, and skill nodes are shared across the agents that use them.';
        document.getElementById('detail-meta').innerHTML = [
          `<span class="pill rounded-full px-2 py-1">${agentCount} agents</span>`,
          `<span class="pill rounded-full px-2 py-1">${skillCount} skills</span>`
        ].join('');
        document.getElementById('detail-source').innerHTML = '<span class="text-sm muted">Generated from embedded dependency metadata.</span>';
        document.getElementById('detail-sections').innerHTML = [
          section('Agent groups', ROLE_GROUPS.map(group => group.label)),
          section('Shared skills', allSkillNames().filter(skill => {
            let count = 0;
            for (const agent of Object.values(DATA.agents)) if ([...(agent.load || []), ...(agent.available || [])].includes(skill)) count++;
            return count > 1;
          }).sort(), skillPill)
        ].join('');
        return;
      }

      const item = mode === 'agents' ? agentInfo(selected) : skillInfo(selected);
      document.getElementById('detail-kicker').textContent = mode === 'agents' ? 'Agent' : 'Skill';
      document.getElementById('detail-title').textContent = mode === 'agents' ? '@' + item.name : '/' + item.name;
      document.getElementById('detail-desc').textContent = item.description || '';
      const meta = [];
      if (mode === 'skills') {
        if (item.type) meta.push(`<span class="pill rounded-full px-2 py-1">type: ${esc(item.type)}</span>`);
        if (item.modelInvocable !== null) meta.push(`<span class="pill rounded-full px-2 py-1">model-invocable: ${esc(item.modelInvocable)}</span>`);
        meta.push(`<span class="pill rounded-full px-2 py-1">source: ${esc(item.source)}</span>`);
      }
      if (item.external) meta.push('<span class="pill rounded-full px-2 py-1">source: referenced</span>');
      document.getElementById('detail-meta').innerHTML = meta.join('');
      document.getElementById('detail-source').innerHTML = item.path ? relLink(item.path) : '<span class="text-sm muted">No source path embedded in this page.</span>';
      if (mode === 'agents') {
        document.getElementById('detail-sections').innerHTML = [
          section('Loaded skills', item.load || [], skillPill),
          section('Available skills', item.available || [], skillPill),
          section('Routed agents', item.routes || [], agentPill),
        ].join('');
      } else {
        document.getElementById('detail-sections').innerHTML = [
          section('Loaded skills', item.loads || [], skillPill),
          section('Internal resources', item.resources || [], r => resourcePill(r)),
        ].join('');
      }
    }

    function renderAll() { renderList(); renderDetail(); renderDiagram(); }

    const stage = document.getElementById('stage');
    const viewport = document.getElementById('viewport');
    const apply = () => { stage.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`; };
    window.resetView = function resetView() { scale = 1; tx = 0; ty = 0; apply(); };
    viewport.addEventListener('wheel', e => { e.preventDefault(); scale = Math.min(2.5, Math.max(0.45, scale - e.deltaY * 0.001)); apply(); }, { passive: false });
    viewport.addEventListener('pointerdown', e => { if (e.target.closest('.node')) return; dragging = true; sx = e.clientX - tx; sy = e.clientY - ty; viewport.setPointerCapture(e.pointerId); });
    viewport.addEventListener('pointermove', e => { if (!dragging) return; tx = e.clientX - sx; ty = e.clientY - sy; apply(); });
    window.addEventListener('pointerup', () => { dragging = false; });

    function toggleNav() { document.getElementById('nav-panel').classList.toggle('collapsed'); }
    function openNav() { document.getElementById('nav-panel').classList.remove('collapsed'); }
    function closeNav() { document.getElementById('nav-panel').classList.add('collapsed'); }
    function toggleDetail() { document.getElementById('detail-panel').classList.toggle('collapsed'); }
    function openDetail() { document.getElementById('detail-panel').classList.remove('collapsed'); }
    function closeDetail() { document.getElementById('detail-panel').classList.add('collapsed'); }

    updateThemeBtn();
    renderAll();
  </script>
</body>
</html>
